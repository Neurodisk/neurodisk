<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma bibliothèque — Neurodisk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; font: inherit; border: none; background: none; }

    :root {
      --blue:        #185FA5;
      --blue-dark:   #0f4478;
      --blue-mid:    #2272bb;
      --blue-light:  #e8f1fb;
      --blue-soft:   #f0f6ff;
      --navy:        #0d2137;
      --white:       #ffffff;
      --bg:          #f5f8fd;
      --surface:     #ffffff;
      --text:        #0d2137;
      --muted:       #566b82;
      --border:      #d1dff0;
      --font:        'Montserrat', 'Segoe UI', Arial, sans-serif;
      --radius:      16px;
      --radius-sm:   10px;
      --nav-h:       68px;
      --shadow-card: 0 2px 16px rgba(13,33,55,0.07);
      --shadow-hover:0 12px 40px rgba(13,33,55,0.14);
      --transition:  200ms ease;

      /* Condition colors */
      --c-arthrose-bg:   #dbeafe; --c-arthrose-text:   #1d4ed8;
      --c-hernie-bg:     #d1fae5; --c-hernie-text:     #065f46;
      --c-douleurs-bg:   #fef3c7; --c-douleurs-text:   #92400e;
      --c-general-bg:    #ede9fe; --c-general-text:    #5b21b6;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 50; height: var(--nav-h);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(209,223,240,0.7);
      box-shadow: 0 1px 12px rgba(13,33,55,0.06);
    }
    .nav__inner {
      max-width: 1240px; margin: 0 auto;
      padding: 0 2rem; height: 100%;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .nav__logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
    .nav__logo img { height: 40px; width: auto; }
    .nav__logo-text { font-size: 1.2rem; font-weight: 800; color: var(--blue); letter-spacing: -0.03em; }
    .nav__right { display: flex; align-items: center; gap: .6rem; }
    .nav__greeting { font-size: .83rem; font-weight: 500; color: var(--muted); white-space: nowrap; }
    .nav__greeting strong { color: var(--text); font-weight: 700; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .45rem 1rem; border-radius: 100px;
      font-size: .8rem; font-weight: 600;
      border: 1.5px solid var(--border); color: var(--muted);
      transition: all var(--transition); white-space: nowrap;
      text-decoration: none;
    }
    .nav-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
    .nav-btn--primary { background: var(--blue); color: var(--white); border-color: var(--blue); }
    .nav-btn--primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); color: var(--white); }
    .nav-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── HERO BANNER ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 60%, var(--blue) 100%);
      padding: 2.5rem 2rem;
      position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      top: -200px; right: -100px; pointer-events: none;
    }
    .hero__inner { max-width: 1240px; margin: 0 auto; position: relative; z-index: 1; }
    .hero__title {
      font-size: 1.6rem; font-weight: 800; color: var(--white);
      letter-spacing: -0.04em; margin-bottom: .4rem;
    }
    .hero__sub { font-size: .875rem; color: rgba(255,255,255,.65); font-weight: 500; }

    /* ── MAIN ── */
    .main { max-width: 1240px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    /* ── FILTRES ── */
    .filters { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem; }
    .filter-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .5rem 1.1rem; border-radius: 100px;
      font-size: .8rem; font-weight: 600;
      border: 1.5px solid var(--border);
      color: var(--muted); background: var(--white);
      transition: all var(--transition); white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
    .filter-btn.is-active { border-color: var(--blue); background: var(--blue); color: var(--white); }
    .filter-btn .count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 5px;
      border-radius: 100px; font-size: .68rem; font-weight: 700;
    }
    .filter-btn:not(.is-active) .count { background: var(--blue-light); color: var(--blue); }
    .filter-btn.is-active .count { background: rgba(255,255,255,.25); }

    /* ── GRILLE ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* ── CARTE ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(24,95,165,.2);
    }
    .card:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

    /* Vignette avec overlay dégradé */
    .card__thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--navy); overflow: hidden; flex-shrink: 0;
    }
    .card__thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card__thumb-bg {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card__thumb-bg svg { width: 44px; height: 44px; opacity: .3; }

    /* Overlay dégradé bas pour les vidéos */
    .card__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(13,33,55,.75) 0%, transparent 55%);
    }

    /* Titre sur l'image (vidéos) */
    .card__img-title {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: .85rem 1rem .7rem;
      font-size: .9rem; font-weight: 700; color: white;
      line-height: 1.3; letter-spacing: -.01em;
    }

    /* Bouton play */
    .card__play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .card__play-btn {
      width: 54px; height: 54px;
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      transition: all var(--transition);
    }
    .card:hover .card__play-btn {
      background: var(--blue); border-color: var(--blue);
      transform: scale(1.08);
      box-shadow: 0 0 0 8px rgba(24,95,165,.2);
    }
    .card__play-btn svg { width: 20px; height: 20px; fill: white; margin-left: 3px; }

    /* Badge durée */
    .card__duration {
      position: absolute; bottom: .6rem; right: .7rem; z-index: 3;
      background: rgba(0,0,0,.65); color: white;
      font-size: .7rem; font-weight: 700; padding: .2rem .55rem;
      border-radius: 5px; letter-spacing: .03em;
    }

    /* Corps carte */
    .card__body { padding: 1.1rem 1.2rem 1.2rem; display: flex; flex-direction: column; gap: .55rem; flex: 1; }
    .card__meta { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .2rem .65rem; border-radius: 100px;
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .badge--video   { background: var(--blue-light); color: var(--blue); }
    .badge--pdf     { background: #fef3c7; color: #92400e; }
    .badge--c-arthrose   { background: var(--c-arthrose-bg);  color: var(--c-arthrose-text); }
    .badge--c-hernie_discale { background: var(--c-hernie-bg); color: var(--c-hernie-text); }
    .badge--c-douleurs_persistantes { background: var(--c-douleurs-bg); color: var(--c-douleurs-text); }
    .badge--c-general { background: var(--c-general-bg); color: var(--c-general-text); }

    /* Titre carte (PDF) */
    .card__title {
      font-size: .95rem; font-weight: 700; color: var(--text);
      line-height: 1.35; letter-spacing: -.01em;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card__desc {
      font-size: .8rem; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card__cta {
      margin-top: auto; padding-top: .65rem;
      display: flex; align-items: center; gap: .35rem;
      font-size: .8rem; font-weight: 700; color: var(--blue);
      letter-spacing: .01em;
    }
    .card__cta svg { flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── ÉTATS ── */
    .state-wrap { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 1rem; gap: 1.25rem; }
    .state-icon { width: 72px; height: 72px; border-radius: 50%; background: var(--blue-light); display: flex; align-items: center; justify-content: center; }
    .state-icon svg { width: 30px; height: 30px; stroke: var(--blue); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .state-title { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .state-text  { font-size: .875rem; color: var(--muted); max-width: 320px; line-height: 1.6; }
    .spinner { width: 38px; height: 38px; border: 3px solid var(--blue-light); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL VIDÉO ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(6,16,30,0.88);
      z-index: 200; align-items: center; justify-content: center;
      padding: 1rem; backdrop-filter: blur(6px);
    }
    .modal-overlay.is-open { display: flex; animation: fadeIn 200ms ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 100%; max-width: 880px;
      background: var(--navy);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
      animation: slideUp 220ms ease;
    }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .modal__title { font-size: .875rem; font-weight: 600; color: rgba(255,255,255,.9); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal__close {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.1); color: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
    }
    .modal__close:hover { background: rgba(255,255,255,.2); color: white; }
    .modal__close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .modal__video { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    .modal__video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 0; background: var(--white);
      border-bottom: 2px solid var(--border);
      padding: 0 2rem; position: sticky; top: var(--nav-h); z-index: 40;
      box-shadow: 0 2px 8px rgba(13,33,55,0.04);
    }
    .tab-btn {
      display: flex; align-items: center; gap: .5rem;
      padding: 1rem 1.25rem; font-size: .875rem; font-weight: 600;
      color: var(--muted); border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: all 200ms; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--blue); }
    .tab-btn.is-active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tab-panel { display: none; }
    .tab-panel.is-active { display: block; }

    /* ── GRILLE EXERCICES ── */
    .exercise-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem;
    }

    /* ── CARTE EXERCICE ── */
    .ex-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-card);
      overflow: hidden; display: flex; flex-direction: column;
      transition: box-shadow 200ms, border-color 200ms;
    }
    .ex-card:hover { box-shadow: var(--shadow-hover); border-color: rgba(24,95,165,.2); }

    .ex-card__thumb {
      position: relative; aspect-ratio: 16/9; background: var(--navy);
      overflow: hidden; flex-shrink: 0; cursor: pointer;
    }
    .ex-card__thumb-bg {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0d2137 0%, #1a4a7a 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .ex-card__thumb-bg svg { width: 44px; height: 44px; opacity: .3; }
    .ex-card__overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,33,55,.75) 0%, transparent 55%); }
    .ex-card__play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .ex-card__play-btn { width: 52px; height: 52px; background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: all 200ms; }
    .ex-card__thumb:hover .ex-card__play-btn { background: var(--blue); border-color: var(--blue); transform: scale(1.08); }
    .ex-card__play-btn svg { width: 18px; height: 18px; fill: white; margin-left: 3px; }
    .ex-card__title-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: .8rem 1rem .65rem; font-size: .875rem; font-weight: 700; color: white; line-height: 1.3; z-index: 2; }

    .ex-card__body { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: .75rem; flex: 1; }

    /* Paramètres de prescription */
    .ex-params {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .4rem .75rem;
    }
    .ex-param {
      display: flex; flex-direction: column; gap: .1rem;
      background: var(--bg); border-radius: 8px; padding: .45rem .65rem;
    }
    .ex-param__label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .ex-param__value { font-size: .875rem; font-weight: 700; color: var(--text); }

    /* Badge groupe musculaire */
    .muscle-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .2rem .65rem; border-radius: 100px;
      background: var(--blue-light); color: var(--blue);
      font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    }

    /* Note du professionnel */
    .ex-note {
      background: #fffbeb; border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0; padding: .6rem .75rem;
      font-size: .8rem; color: #92400e; line-height: 1.5;
    }
    .ex-note strong { display: block; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; color: #b45309; }

    /* Bouton compléter */
    .btn-complete {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      width: 100%; padding: .7rem 1rem; border-radius: var(--radius);
      font-size: .85rem; font-weight: 700; letter-spacing: .01em;
      border: 2px solid var(--border); color: var(--muted);
      transition: all 200ms; margin-top: auto;
    }
    .btn-complete:hover:not(.is-done) {
      border-color: var(--blue); color: var(--blue); background: var(--blue-light);
    }
    .btn-complete.is-done {
      border-color: #16a34a; background: #f0fdf4; color: #16a34a;
    }
    .btn-complete svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Compteur de séances */
    .ex-streak {
      text-align: center; font-size: .75rem; color: var(--muted);
      font-weight: 500;
    }
    .ex-streak strong { color: var(--blue); }

    /* ── TOAST ── */
    .toast-wrap { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: .5rem; pointer-events: none; }
    .toast { background: var(--navy); color: white; padding: .7rem 1rem; border-radius: var(--radius-sm); font-size: .83rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,.2); pointer-events: auto; animation: toastIn 220ms ease; }
    .toast--error { background: #c0392b; }
    @keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }

    /* ── PAGE LOADER ── */
    .page-loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 300ms; }
    .page-loader.is-hidden { opacity: 0; pointer-events: none; }
    .page-loader__spin { width: 42px; height: 42px; border: 3px solid var(--blue-light); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2,1fr); } .exercise-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .exercise-grid { grid-template-columns: 1fr; }
      .tabs { padding: 0 1rem; }
      .hero { padding: 1.75rem 1.25rem; }
      .hero__title { font-size: 1.3rem; }
      .main { padding: 1.5rem 1.25rem 4rem; }
      .nav__inner { padding: 0 1.25rem; }
      .nav__greeting { display: none; }
    }
    @media (max-width: 480px) {
      .nav-btn span { display: none; }
      .nav-btn { padding: .45rem .65rem; }
    }
  </style>
</head>
<body>

  <div class="page-loader" id="pageLoader"><div class="page-loader__spin"></div></div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="/assets/logo-neurodisk.png" alt="Neurodisk"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
        <span class="nav__logo-text" style="display:none">Neurodisk</span>
      </a>
      <div class="nav__right">
        <span class="nav__greeting" id="greeting"></span>
        <a href="/admin/" id="btnAdmin" style="display:none" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Admin</span>
        </a>
        <button class="nav-btn nav-btn--primary" id="btnSignout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Déconnexion</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero__inner">
      <h1 class="hero__title" id="heroTitle">Mes ressources cliniques</h1>
      <p class="hero__sub" id="heroSub">Ressources sélectionnées par votre équipe selon votre condition.</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn is-active" data-tab="bibliotheque">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Ma bibliothèque
    </button>
    <button class="tab-btn" data-tab="programme">
      <svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
      Mon programme
    </button>
  </div>

  <!-- Contenu -->
  <main class="main">

    <!-- Onglet bibliothèque -->
    <div class="tab-panel is-active" id="tab-bibliotheque">
      <div class="filters" id="filters"></div>
      <div class="grid" id="grid" role="list">
        <div class="state-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Onglet programme -->
    <div class="tab-panel" id="tab-programme">
      <div class="exercise-grid" id="exerciseGrid">
        <div class="state-wrap"><div class="spinner"></div></div>
      </div>
    </div>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <div class="modal__header">
        <span class="modal__title" id="modalTitle"></span>
        <button class="modal__close" id="modalClose" aria-label="Fermer">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__video" id="modalVideo"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL      = 'https://xyczzekvgahkzlntsils.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_yRetJVmDBuU6XNY08FbXfQ_C9glVlqi';
    const BUNNY_LIBRARY_ID  = '676634';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    const COND = {
      arthrose:'Arthrose', hernie_discale:'Hernie discale',
      douleurs_persistantes:'Douleurs persistantes', general:'Général',
    };

    let allResources = [], activeFilter = 'all';
    const loader = document.getElementById('pageLoader');

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.replace('/'); return; }

      loader.classList.add('is-hidden');
      setTimeout(() => loader.remove(), 350);

      const user = session.user;
      setGreeting(user);

      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', user.id).single();
      const isAdmin = profile?.is_admin === true;
      if (isAdmin) document.getElementById('btnAdmin').style.display = 'flex';

      await loadResources(user.id, isAdmin);
    }

    function setGreeting(user) {
      const name = user.user_metadata?.full_name || user.email?.split('@')[0] || '';
      const h = new Date().getHours();
      const s = h < 12 ? 'Bonjour' : h < 18 ? 'Bon après-midi' : 'Bonsoir';
      document.getElementById('greeting').innerHTML = `${s}, <strong>${esc(name.split(' ')[0])}</strong>`;
    }

    async function loadResources(userId, isAdmin = false) {
      try {
        let resources;
        if (isAdmin) {
          const { data, error } = await supabase.from('resources').select('*').order('condition_tag').order('sort_order');
          if (error) throw error;
          resources = data;
        } else {
          const { data, error } = await supabase.from('patient_resources').select(`assigned_at, resource:resources (id,title,description,type,condition_tag,bunny_video_id,pdf_url,thumbnail_url,duration_sec,sort_order)`).order('assigned_at', { ascending: false });
          if (error) throw error;
          resources = data.map(r => ({ ...r.resource, assigned_at: r.assigned_at })).filter(r => r?.id);
        }
        allResources = resources.sort((a, b) => a.sort_order - b.sort_order);
        renderFilters(); renderGrid('all');
      } catch (e) {
        renderError(); toast('Impossible de charger vos ressources.', 'error');
      }
    }

    function renderFilters() {
      const filtersEl = document.getElementById('filters');
      const counts = {};
      allResources.forEach(r => { counts[r.condition_tag] = (counts[r.condition_tag]||0)+1; });
      if (Object.keys(counts).length <= 1) { filtersEl.style.display = 'none'; return; }
      const btns = [{ k:'all', l:'Tout', n:allResources.length }, ...Object.entries(counts).map(([k,n]) => ({ k, l:COND[k]||k, n }))];
      filtersEl.innerHTML = btns.map(b => `<button class="filter-btn${b.k==='all'?' is-active':''}" data-filter="${b.k}">${b.l}<span class="count">${b.n}</span></button>`).join('');
      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('is-active', b===btn));
          renderGrid(btn.dataset.filter);
        });
      });
    }

    function renderGrid(filter) {
      const list = filter === 'all' ? allResources : allResources.filter(r => r.condition_tag === filter);
      const grid = document.getElementById('grid');
      if (!list.length) {
        grid.innerHTML = `<div class="state-wrap"><div class="state-icon"><svg viewBox="0 0 24 24"><path d="M22 16.74V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h16"/><path d="M7 8h10M7 12h6"/></svg></div><p class="state-title">Aucune ressource ici</p><p class="state-text">Votre équipe n'a pas encore assigné de ressources pour cette condition.</p></div>`;
        return;
      }
      grid.innerHTML = list.map(r => renderCard(r)).join('');
      grid.querySelectorAll('.card').forEach(c => {
        c.addEventListener('click', () => {
          if (c.dataset.type==='video') openModal(c.dataset.id, c.dataset.title, c.dataset.url);
          else window.open(c.dataset.url, '_blank', 'noopener');
        });
        c.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); c.click(); } });
      });
    }

    function renderCard(r) {
      const isVideo = r.type === 'video';
      const condLabel = COND[r.condition_tag] || r.condition_tag;
      const embedUrl = isVideo ? `https://iframe.mediadelivery.net/embed/${BUNNY_LIBRARY_ID}/${r.bunny_video_id}?autoplay=true&responsive=true` : '';
      const thumb = r.thumbnail_url ? `<img src="${esc(r.thumbnail_url)}" alt="" loading="lazy">` : `<div class="card__thumb-bg">${isVideo ? svgVideo() : svgPdf()}</div>`;
      const dur = isVideo && r.duration_sec ? `<span class="card__duration">${fmtDur(r.duration_sec)}</span>` : '';

      if (isVideo) {
        return `<article class="card" role="listitem" tabindex="0" data-id="${r.id}" data-type="video" data-url="${esc(embedUrl)}" data-title="${esc(r.title)}">
          <div class="card__thumb">
            ${thumb}
            <div class="card__overlay"></div>
            <div class="card__play"><div class="card__play-btn"><svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
            <p class="card__img-title">${esc(r.title)}</p>
            ${dur}
          </div>
          <div class="card__body">
            <div class="card__meta">
              <span class="badge badge--video">Vidéo</span>
              <span class="badge badge--c-${r.condition_tag}">${condLabel}</span>
            </div>
            ${r.description ? `<p class="card__desc">${esc(r.description)}</p>` : ''}
            <p class="card__cta"><svg viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg> Visionner la vidéo</p>
          </div>
        </article>`;
      } else {
        return `<article class="card" role="listitem" tabindex="0" data-id="${r.id}" data-type="pdf" data-url="${esc(r.pdf_url||'')}" data-title="${esc(r.title)}">
          <div class="card__thumb">
            ${thumb}
          </div>
          <div class="card__body">
            <div class="card__meta">
              <span class="badge badge--pdf">PDF</span>
              <span class="badge badge--c-${r.condition_tag}">${condLabel}</span>
            </div>
            <h2 class="card__title">${esc(r.title)}</h2>
            ${r.description ? `<p class="card__desc">${esc(r.description)}</p>` : ''}
            <p class="card__cta"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Ouvrir le PDF</p>
          </div>
        </article>`;
      }
    }

    // Modal
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle   = document.getElementById('modalTitle');
    const modalVideo   = document.getElementById('modalVideo');
    document.getElementById('modalClose').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target===modalOverlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape' && modalOverlay.classList.contains('is-open')) closeModal(); });

    function openModal(id, title, url) {
      modalTitle.textContent = title;
      modalVideo.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
      modalOverlay.classList.add('is-open');
      modalOverlay.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modalOverlay.classList.remove('is-open');
      modalOverlay.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
      setTimeout(() => { modalVideo.innerHTML = ''; }, 300);
    }

    // Déconnexion
    document.getElementById('btnSignout').addEventListener('click', async () => {
      await supabase.auth.signOut(); window.location.replace('/');
    });

    function renderError() {
      document.getElementById('grid').innerHTML = `<div class="state-wrap"><div class="state-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><p class="state-title">Erreur de chargement</p><p class="state-text">Rechargez la page ou contactez la clinique.</p></div>`;
    }
    function toast(msg, type='info') {
      const el = document.createElement('div');
      el.className = `toast${type!=='info'?' toast--'+type:''}`;
      el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
    function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function svgVideo() { return `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`; }
    function svgPdf()   { return `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`; }

    init().catch(() => { loader.classList.add('is-hidden'); renderError(); });

    // ══════════════════════════════════════════════════════
    // ONGLETS
    // ══════════════════════════════════════════════════════
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('is-active', b === btn));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('is-active', p.id === 'tab-' + tab));
        if (tab === 'programme') {
          document.getElementById('heroTitle').textContent = 'Mon programme';
          document.getElementById('heroSub').textContent = 'Exercices prescrits par votre professionnel.';
          if (!programmeLoaded) loadProgramme();
        } else {
          document.getElementById('heroTitle').textContent = 'Mes ressources cliniques';
          document.getElementById('heroSub').textContent = 'Ressources sélectionnées par votre équipe selon votre condition.';
        }
      });
    });

    // ══════════════════════════════════════════════════════
    // MODULE PROGRAMME
    // ══════════════════════════════════════════════════════
    let programmeLoaded = false;
    let currentUserId   = null;

    // Récupérer l'userId après init
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) currentUserId = session.user.id;
    });

    async function loadProgramme() {
      programmeLoaded = true;
      const grid = document.getElementById('exerciseGrid');

      try {
        // Récupérer les exercices prescrits avec leurs paramètres
        const { data, error } = await supabase
          .from('patient_exercises')
          .select(`
            id, sets, reps, rest_sec, frequency, notes, sort_order,
            exercise:exercises (id, title, description, bunny_video_id, thumbnail_url, muscle_group)
          `)
          .order('sort_order');
        if (error) throw error;

        if (!data || !data.length) {
          grid.innerHTML = `<div class="state-wrap">
            <div class="state-icon"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></div>
            <p class="state-title">Aucun exercice prescrit</p>
            <p class="state-text">Votre professionnel n'a pas encore créé votre programme.</p>
          </div>`;
          return;
        }

        // Récupérer les logs d'aujourd'hui
        const todayStart = new Date();
        todayStart.setHours(0,0,0,0);
        const { data: logs } = await supabase
          .from('exercise_logs')
          .select('exercise_id, completed_at')
          .gte('completed_at', todayStart.toISOString());

        const completedToday = new Set((logs||[]).map(l => l.exercise_id));

        // Compter le total de séances par exercice
        const { data: allLogs } = await supabase
          .from('exercise_logs')
          .select('exercise_id');
        const logCounts = {};
        (allLogs||[]).forEach(l => { logCounts[l.exercise_id] = (logCounts[l.exercise_id]||0)+1; });

        grid.innerHTML = data.map(pe => renderExerciseCard(pe, completedToday.has(pe.exercise.id), logCounts[pe.exercise.id]||0)).join('');

        // Boutons compléter
        grid.querySelectorAll('.btn-complete').forEach(btn => {
          btn.addEventListener('click', () => toggleComplete(btn));
        });

        // Thumbs cliquables → modal
        grid.querySelectorAll('.ex-card__thumb[data-video]').forEach(thumb => {
          thumb.addEventListener('click', () => {
            const url = `https://iframe.mediadelivery.net/embed/${BUNNY_LIBRARY_ID}/${thumb.dataset.video}?autoplay=true&responsive=true`;
            openModal(thumb.dataset.title, url);
          });
        });

      } catch(e) {
        grid.innerHTML = `<div class="state-wrap"><p class="state-title">Erreur de chargement</p></div>`;
      }
    }

    function renderExerciseCard(pe, doneToday, totalCount) {
      const ex = pe.exercise;
      const hasVideo = !!ex.bunny_video_id;
      const thumb = `<div class="ex-card__thumb"${hasVideo ? ` data-video="${esc(ex.bunny_video_id)}" data-title="${esc(ex.title)}"` : ''} style="${hasVideo?'cursor:pointer':''}">
        <div class="ex-card__thumb-bg">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5" stroke-linecap="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
        </div>
        ${hasVideo ? `<div class="ex-card__overlay"></div>
        <div class="ex-card__play"><div class="ex-card__play-btn"><svg viewBox="0 0 24 24" fill="white" style="width:18px;height:18px;margin-left:3px"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
        <p class="ex-card__title-overlay">${esc(ex.title)}</p>` : ''}
      </div>`;

      const params = [
        pe.sets    ? { label:'Séries', value: pe.sets + ' séries' } : null,
        pe.reps    ? { label:'Répétitions', value: pe.reps + ' reps' } : null,
        pe.rest_sec? { label:'Repos', value: fmtRest(pe.rest_sec) } : null,
        pe.frequency?{ label:'Fréquence', value: pe.frequency } : null,
      ].filter(Boolean);

      return `<div class="ex-card">
        ${thumb}
        <div class="ex-card__body">
          ${ex.muscle_group ? `<span class="muscle-badge">💪 ${esc(ex.muscle_group)}</span>` : ''}
          ${!hasVideo ? `<h3 style="font-size:.95rem;font-weight:700;color:var(--text);letter-spacing:-.01em">${esc(ex.title)}</h3>` : ''}
          ${ex.description ? `<p style="font-size:.8rem;color:var(--muted);line-height:1.55">${esc(ex.description)}</p>` : ''}
          ${params.length ? `<div class="ex-params">${params.map(p=>`<div class="ex-param"><span class="ex-param__label">${p.label}</span><span class="ex-param__value">${p.value}</span></div>`).join('')}</div>` : ''}
          ${pe.notes ? `<div class="ex-note"><strong>📝 Note du professionnel</strong>${esc(pe.notes)}</div>` : ''}
          <button class="btn-complete${doneToday?' is-done':''}" data-exercise="${esc(ex.id)}" data-done="${doneToday}">
            <svg viewBox="0 0 24 24">${doneToday?'<path d="M20 6L9 17l-5-5"/>':'<circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>'}</svg>
            ${doneToday ? 'Complété aujourd\'hui ✓' : 'Marquer comme complété'}
          </button>
          ${totalCount > 0 ? `<p class="ex-streak"><strong>${totalCount}</strong> séance${totalCount>1?'s':''} complétée${totalCount>1?'s':''} au total</p>` : ''}
        </div>
      </div>`;
    }

    async function toggleComplete(btn) {
      const exerciseId = btn.dataset.exercise;
      const isDone = btn.dataset.done === 'true';
      btn.disabled = true;

      if (!isDone) {
        // Marquer comme complété
        const { error } = await supabase.from('exercise_logs').insert({
          patient_id: currentUserId, exercise_id: exerciseId,
        });
        if (!error) {
          btn.dataset.done = 'true';
          btn.classList.add('is-done');
          btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Complété aujourd'hui ✓`;
          toast('Exercice complété ! 💪', 'success');
          // Mettre à jour le compteur
          const streak = btn.parentElement.querySelector('.ex-streak');
          if (streak) {
            const n = parseInt(streak.querySelector('strong').textContent) + 1;
            streak.innerHTML = `<strong>${n}</strong> séance${n>1?'s':''} complétée${n>1?'s':''} au total`;
          } else {
            const newStreak = document.createElement('p');
            newStreak.className = 'ex-streak';
            newStreak.innerHTML = `<strong>1</strong> séance complétée au total`;
            btn.after(newStreak);
          }
        }
      } else {
        // Décocher — supprimer le log d'aujourd'hui
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const { error } = await supabase.from('exercise_logs')
          .delete()
          .eq('patient_id', currentUserId)
          .eq('exercise_id', exerciseId)
          .gte('completed_at', todayStart.toISOString());
        if (!error) {
          btn.dataset.done = 'false';
          btn.classList.remove('is-done');
          btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg> Marquer comme complété`;
        }
      }
      btn.disabled = false;
    }

    function fmtRest(sec) {
      if (sec >= 60) return `${Math.floor(sec/60)} min${sec%60 ? ' '+sec%60+'s' : ''}`;
      return `${sec} sec`;
    }

    function openModal(title, url) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalVideo').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
      document.getElementById('modalOverlay').classList.add('is-open');
      document.getElementById('modalOverlay').setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    }
  </script>
</body>
</html>
