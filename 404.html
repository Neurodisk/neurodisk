<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Neurodisk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      background: #F7F9FD; color: #1A1A2E;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; text-align: center;
    }
    .box { max-width: 420px; }
    .code { font-size: 4rem; font-weight: 800; color: #2468D6; letter-spacing: -.04em; margin-bottom: .5rem; }
    h1 { font-size: 1.3rem; font-weight: 800; color: #1B2B6B; margin-bottom: .75rem; letter-spacing: -.02em; }
    p { font-size: .95rem; color: #666; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block; padding: .8rem 1.75rem; border-radius: 100px;
      background: #2468D6; color: #fff; text-decoration: none;
      font-weight: 700; font-size: .9rem;
      box-shadow: 0 4px 16px rgba(36,104,214,.3);
      transition: background 150ms;
    }
    a:hover { background: #1A52B5; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Cette page n'existe pas</h1>
    <p>La page que vous cherchez a peut-être été déplacée ou n'existe plus.<br>Retournez à l'accueil pour vous connecter à votre espace.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
