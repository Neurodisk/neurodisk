<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — Neurodisk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; font: inherit; border: none; }
    input  { font: inherit; }

    :root {
      --blue:        #185FA5;
      --blue-dark:   #0f4478;
      --blue-mid:    #2272bb;
      --blue-light:  #e8f1fb;
      --blue-soft:   #f0f6ff;
      --navy:        #0d2137;
      --white:       #ffffff;
      --bg:          #f5f8fd;
      --text:        #0d2137;
      --muted:       #566b82;
      --border:      #d1dff0;
      --success:     #0f8a48;
      --success-bg:  #e6f7ef;
      --error:       #c0392b;
      --error-bg:    #fdf0ee;
      --font:        'Montserrat', 'Segoe UI', Arial, sans-serif;
      --radius:      14px;
      --radius-pill: 100px;
      --shadow-lg:   0 20px 60px rgba(13,33,55,0.14);
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .bg-shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-shapes::before {
      content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(24,95,165,0.07) 0%, transparent 70%);
      top: -200px; right: -100px;
    }
    .bg-shapes::after {
      content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(24,95,165,0.05) 0%, transparent 70%);
      bottom: -100px; left: -100px;
    }

    .page {
      flex: 1; position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
      padding: 3rem 2.75rem;
      border: 1px solid rgba(209,223,240,0.6);
    }

    .card__header { text-align: center; margin-bottom: 2rem; }
    .logo-img { height: 52px; width: auto; margin: 0 auto 1.75rem; }
    .card__title { font-size: 1.35rem; font-weight: 700; color: var(--text); letter-spacing: -0.03em; margin-bottom: .5rem; }
    .card__sub   { font-size: .875rem; color: var(--muted); line-height: 1.6; }

    .form { display: flex; flex-direction: column; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: .8rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .05em; }

    .password-wrap { position: relative; display: flex; align-items: center; }
    .password-wrap input { padding-right: 3rem !important; }
    .field input[type="password"], .field input[type="text"] {
      width: 100%; padding: .8rem 1.1rem;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: .95rem; color: var(--text); background: var(--bg);
      transition: border-color 150ms, box-shadow 150ms, background 150ms; outline: none;
    }
    .field input:focus {
      border-color: var(--blue); background: var(--white);
      box-shadow: 0 0 0 4px rgba(24,95,165,.1);
    }
    .field input.is-error { border-color: var(--error); box-shadow: 0 0 0 4px rgba(192,57,43,.08); }

    .btn-eye {
      position: absolute; right: .75rem;
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      color: var(--muted); background: none; border: none; cursor: pointer;
      transition: color 150ms, background 150ms; flex-shrink: 0;
    }
    .btn-eye:hover { color: var(--blue); background: var(--blue-light); }
    .btn-eye svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-primary {
      width: 100%; padding: .9rem 1.5rem;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
      color: var(--white); border-radius: var(--radius-pill);
      font-size: .9rem; font-weight: 700; letter-spacing: .02em;
      box-shadow: 0 4px 20px rgba(24,95,165,.35);
      transition: transform 150ms, box-shadow 150ms, opacity 150ms;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(24,95,165,.45); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-primary .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
    .btn-primary.is-loading .btn-label { display: none; }
    .btn-primary.is-loading .spinner  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      display: none; align-items: flex-start; gap: .6rem;
      padding: .8rem 1rem; border-radius: var(--radius);
      font-size: .83rem; line-height: 1.5;
    }
    .alert.is-visible { display: flex; }
    .alert--error   { background: var(--error-bg);   color: var(--error); }
    .alert--success { background: var(--success-bg); color: var(--success); }

    /* État de chargement / succès / erreur */
    .state { text-align: center; display: none; flex-direction: column; align-items: center; gap: 1rem; }
    .state.is-visible { display: flex; }
    .state__icon {
      width: 68px; height: 68px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .state__icon--success { background: var(--success-bg); }
    .state__icon--success svg { stroke: var(--success); }
    .state__icon--error { background: var(--error-bg); }
    .state__icon--error svg { stroke: var(--error); }
    .state__title { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
    .state__text  { font-size: .83rem; color: var(--muted); line-height: 1.6; max-width: 280px; }
    .btn-link {
      background: none; color: var(--blue); font-size: .875rem; font-weight: 600;
      padding: .3rem 0; text-decoration: underline; text-underline-offset: 3px;
      transition: color 150ms;
    }
    .btn-link:hover { color: var(--blue-dark); }

    .page-loader {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      transition: opacity 300ms;
    }
    .page-loader.is-hidden { opacity: 0; pointer-events: none; }
    .page-loader__ring {
      width: 38px; height: 38px; border: 3px solid var(--blue-light);
      border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite;
    }

    .site-footer {
      position: relative; z-index: 1;
      text-align: center; padding: 1.5rem 1rem;
      font-size: .75rem; color: var(--muted);
    }

    @media (max-width: 480px) { .card { padding: 2.25rem 1.75rem; } }
  </style>
</head>
<body>

  <div class="bg-shapes"></div>
  <div class="page-loader" id="pageLoader"><div class="page-loader__ring"></div></div>

  <main class="page">
    <div class="card">

      <header class="card__header">
        <img class="logo-img" src="/assets/logo-neurodisk.png" alt="Neurodisk"
          onerror="this.style.display='none'">
        <h1 class="card__title" id="pageTitle">Nouveau mot de passe</h1>
        <p class="card__sub" id="pageSub">Choisissez un nouveau mot de passe sécurisé.</p>
      </header>

      <!-- ── Formulaire ── -->
      <div id="viewForm">
        <div class="form">
          <div class="field">
            <label for="pwdInput">Nouveau mot de passe</label>
            <div class="password-wrap">
              <input type="password" id="pwdInput" placeholder="Minimum 6 caractères" autocomplete="new-password">
              <button type="button" class="btn-eye" id="btnEye1" aria-label="Afficher le mot de passe">
                <svg id="eyeIcon1" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="pwdConfirm">Confirmer le mot de passe</label>
            <div class="password-wrap">
              <input type="password" id="pwdConfirm" placeholder="Répéter le mot de passe" autocomplete="new-password">
              <button type="button" class="btn-eye" id="btnEye2" aria-label="Afficher le mot de passe">
                <svg id="eyeIcon2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="alert alert--error" id="formError" role="alert" aria-live="polite">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="formErrorText"></span>
          </div>

          <button class="btn-primary" id="btnSave">
            <span class="btn-label">Enregistrer le mot de passe</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <!-- ── Succès ── -->
      <div class="state" id="stateSuccess">
        <div class="state__icon state__icon--success">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <p class="state__title">Mot de passe mis à jour !</p>
        <p class="state__text">Vous allez être redirigé vers votre bibliothèque…</p>
      </div>

      <!-- ── Erreur token ── -->
      <div class="state" id="stateError">
        <div class="state__icon state__icon--error">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <p class="state__title">Lien invalide ou expiré</p>
        <p class="state__text">Ce lien de réinitialisation n'est plus valide. Les liens expirent après 60 minutes.</p>
        <button class="btn-link" onclick="window.location.replace('/')">Demander un nouveau lien</button>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    &copy; <span id="year"></span> Clinique Neurodisk — Saguenay, Québec
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL      = 'https://jqxykxkikvrgwnajhhbi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_t1EUH4wn9vtNBC7pUNbKOA_OhFfWsEi';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    const loader      = document.getElementById('pageLoader');
    const viewForm    = document.getElementById('viewForm');
    const stateSuccess= document.getElementById('stateSuccess');
    const stateError  = document.getElementById('stateError');
    const formError   = document.getElementById('formError');
    const formErrorText = document.getElementById('formErrorText');
    const pwdInput    = document.getElementById('pwdInput');
    const pwdConfirm  = document.getElementById('pwdConfirm');
    const btnSave     = document.getElementById('btnSave');

    // ── Vérifier la session de récupération ──────────────
    async function init() {
      // Supabase détecte automatiquement le token recovery dans l'URL
      const { data: { session } } = await supabase.auth.getSession();

      loader.classList.add('is-hidden');
      setTimeout(() => loader.remove(), 350);

      if (!session) {
        // Pas de session valide → lien invalide ou expiré
        viewForm.style.display = 'none';
        stateError.classList.add('is-visible');
        return;
      }

      pwdInput.focus();
    }
    init();

    // ── Toggle afficher/masquer mot de passe ─────────────
    const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    function makeEyeToggle(btnId, iconId, inputEl) {
      document.getElementById(btnId).addEventListener('click', () => {
        const show = inputEl.type === 'password';
        inputEl.type = show ? 'text' : 'password';
        document.getElementById(iconId).innerHTML = show ? eyeOpen : eyeClosed;
        inputEl.focus();
      });
    }
    makeEyeToggle('btnEye1', 'eyeIcon1', pwdInput);
    makeEyeToggle('btnEye2', 'eyeIcon2', pwdConfirm);

    // ── Enregistrer le nouveau mot de passe ──────────────
    btnSave.addEventListener('click', async () => {
      const pwd     = pwdInput.value;
      const confirm = pwdConfirm.value;

      formError.classList.remove('is-visible');

      if (pwd.length < 6) {
        showError('Le mot de passe doit contenir au moins 6 caractères.');
        pwdInput.focus(); return;
      }
      if (pwd !== confirm) {
        showError('Les deux mots de passe ne correspondent pas.');
        pwdConfirm.focus(); return;
      }

      btnSave.disabled = true;
      btnSave.classList.add('is-loading');

      try {
        const { error } = await supabase.auth.updateUser({ password: pwd });
        if (error) throw error;

        viewForm.style.display = 'none';
        stateSuccess.classList.add('is-visible');

        // Redirection automatique après 2 secondes
        setTimeout(() => window.location.replace('/library.html'), 2000);

      } catch (err) {
        console.error('[reset-password]', err);
        showError('Erreur : ' + err.message);
      } finally {
        btnSave.disabled = false;
        btnSave.classList.remove('is-loading');
      }
    });

    // Soumettre avec Entrée
    [pwdInput, pwdConfirm].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') btnSave.click(); });
    });

    function showError(msg) {
      formErrorText.textContent = msg;
      formError.classList.add('is-visible');
    }
  </script>
</body>
</html>
